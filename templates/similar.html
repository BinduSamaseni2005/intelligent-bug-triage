<!DOCTYPE html>
<html>

<head>

<title>Similar Bug Search</title>

<style>

body{
    font-family:Arial;
    background:#f4f6f9;
    padding:30px;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px lightgray;
}

input{
    width:80%;
    padding:10px;
    font-size:16px;
}

button{
    background:#007bff;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table,th,td{
    border:1px solid #ddd;
}

th{
    background:#007bff;
    color:white;
}

th,td{
    padding:10px;
    text-align:left;
}

.nav{
    margin-bottom:20px;
}

.nav a{
    text-decoration:none;
    font-weight:bold;
    margin-right:15px;
}

</style>

</head>

<body>

<div class="nav">
    <a href="/">🏠 Home</a>
    <a href="/dashboard">📊 Dashboard</a>
</div>

<div class="container">

<h1>🔍 Similar Bug Search</h1>

<form action="/search_similar" method="POST">

<input
type="text"
name="bug"
placeholder="Enter bug description"
required>

<button type="submit">
Search
</button>

</form>

{% if results %}

<hr>

<h2>Query:</h2>

<p><b>{{ query }}</b></p>

<h2>Top Similar Bugs</h2>

<table>

<tr>
<th>Bug Description</th>
<th>Similarity %</th>
</tr>

{% for bug, score in results %}

<tr>
<td>{{ bug }}</td>
<td>{{ score }}%</td>
</tr>

{% endfor %}

</table>

{% endif %}

</div>

</body>

</html>
